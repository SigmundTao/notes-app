<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes-app</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="sidebar">
        <ul id="nav-bar">
            <li class="nav-item" id="all-notes-btn"></li>
            <li class="nav-item" id="bookmark-nav-item"></li>
        </ul>
        <div id="displaying-notes-container"></div>
    </div>
    <div id="note-display-div">
        <input type="text" id="note-title">
        <input type="text" id="categories" placeholder="[School Work] - try creating a category by placing [ ] around a word/set of words">
        <textarea name="note-body-textarea" id="note-body"></textarea>
        <div id="count-holder">
            <p id="word-count"></p>
            <p id="character-count"></p>
        </div>
        <button id="create-new-note-btn">+</button>
    </div>
    <dialog id="search-menu">
        <div>
            <button id="close-search-menu-btn">X</button>
            <input type="text" id="search-bar">
            <div id="search-results"></div>
        </div>
    </dialog>

    <script src="main.js"></script>
</body>
</html>
