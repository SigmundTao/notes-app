<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes-app</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="perm-sidebar">
        <ul id="perm-nav-bar">
            <li id="files-btn" class="perm-nav-bar-item"></li>
        </ul>
    </div>
    <div id="sidebar">
        <ul id="nav-bar">
            <li class="nav-item" id="new-note-btn"></li>
            <li class="nav-item" id="create-folder-btn"></li>
        </ul>
        <div id="displaying-notes-container"></div>
        <div id="folder-holder"></div>
    </div>
    <div id="note-display-div">
        <input type="text" id="note-title">
        <input type="text" id="tags-input">
        <div id="tags-display"></div>
        <textarea name="note-body-textarea" id="note-body"></textarea>
        <div id="note-info-holder">
            <span id="dates-span" class="info-span">
                <p id="date-created"></p>
                <p id="date-last-edited"></p>
            </span>
            <span id="counts-span" class="info-span">
                <p id="word-count"></p>
                <p id="character-count"></p>
            </span>
        </div>
    </div>
    <div id="idle-screen">Press  '<span id="new-file-anchor-text">Alt + n</span>'  to create a new note</div>
    <dialog id="search-menu">
        <div>
            <button id="close-search-menu-btn">X</button>
            <input type="text" id="search-bar">
            <div id="search-results"></div>
        </div>
    </dialog>

    <script type="module" src="js/main.js" ></script>
</body>
</html>
