<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ginkgo</title>
    <link rel="stylesheet" href="./styles/base.css">
    <link rel="stylesheet" href="./styles/markdown.css">
    <link rel="stylesheet" href="./styles/filetree.css">
    <link rel="icon" type="image/x-icon" href="./assets/ginkgo-tree.svg">
</head>
<body>
    <main id="page">
        <ul id="nav-bar">
            <li id="open-files-btn" class="nav-item"></li>
        </ul>
        <div id="filetree">
            <ul id="filetree-nav">
                <li class="filetree-nav-item" id="create-note-btn"></li>
                <li class="filetree-nav-item" id="create-folder-btn"></li>
            </ul>
            <div id="files-container"></div>
        </div>
        <div id="file-display">
            <div id="tab-bar"></div>
            <div id="current-tab"></div>
        </div>
    </main>
    <dialog id="search-menu">
        <div>
            <input type="text" id="search-bar">
            <div id="search-results"></div>
        </div>
    </dialog>

    <script type="module" src="js/main.js" ></script>
</body>
</html>
